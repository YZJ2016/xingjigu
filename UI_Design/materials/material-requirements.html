<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星技谷 MES | 用料需求</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./materials.css" />
  </head>
  <body>
    <script>
      window.MATERIAL_PAGE = { id: "requirements", title: "用料需求", eyebrow: "物料与线边库 / 用料需求" };
    </script>
    <div class="app-shell">
      <aside class="sidebar" aria-label="MES 业务导航菜单">
        <div class="brand"><div class="brand-mark">X</div><div><div class="brand-name">星技谷 MES</div><div class="brand-subtitle">生产运营中枢</div></div></div>
        <div class="menu-heading">业务导航</div>
        <nav id="materialsModuleMenu" class="module-menu"></nav>
        <div class="sidebar-footer"><div class="factory-card"><div class="factory-card__label">当前工厂</div><div class="factory-card__name">华东一厂 · 电子装配车间</div><div class="factory-card__meta"><span>物料计划</span><span>排程 / 派工 / BOM</span></div></div></div>
      </aside>
      <main class="main materials-main">
        <header class="topbar">
          <div><div id="pageEyebrow" class="eyebrow"></div><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div>
          <div class="topbar-actions"><button id="primaryActionBtn" class="primary-action" type="button">生成领料申请</button><button id="resetMaterialsBtn" class="secondary-action" type="button">重置演示</button><a class="secondary-link" href="../orders/kit-check.html">齐套检查</a><a class="secondary-link" href="../dispatch/task-release.html">任务下达</a><a class="secondary-link" href="../index.html">返回首页</a><div class="user-chip"><span class="avatar">料</span><span id="userRole"></span></div></div>
        </header>
        <section id="materialsMetrics" class="materials-metrics"></section>
        <section class="materials-layout">
          <div class="materials-left">
            <div class="materials-toolbar"><label>搜索<input id="searchInput" type="search" placeholder="工单、派工、物料、批次、责任人" /></label><label>状态<select id="statusFilter"></select></label><label>产线<select id="lineFilter"></select></label></div>
            <section class="materials-panel"><div class="materials-panel__head"><div><h3 id="tableTitle"></h3><p id="tableHint"></p></div><button id="openDetailBtn" type="button" hidden>打开详情</button></div><div class="materials-table-wrap"><table class="materials-table"><thead id="tableHead"></thead><tbody id="materialsTableBody"></tbody></table></div></section>
            <section class="materials-panel"><div class="materials-panel__head"><div><h3 id="cardTitle"></h3><p>保留单据、批次、责任人和下游业务入口</p></div></div><div id="materialsCards" class="materials-card-grid"></div></section>
            <section class="simulation-box"><div class="simulation-box__head"><div><h3 id="simulationTitle"></h3><p id="simulationHint"></p></div></div><div class="simulation-form"><input id="simulationInput" type="text" /><div class="simulation-actions"><button id="simulateBtn" type="button">记录模拟回执</button><button id="secondaryActionBtn" type="button">登记异常处置</button></div></div></section>
          </div>
          <aside class="materials-side"><section id="materialsDetail" class="materials-detail"><div class="materials-detail__head"><div><span id="detailStatus" class="pill"></span><h3 id="detailTitle"></h3><p id="detailSubtitle"></p></div><button id="closeDetailBtn" class="icon-button" type="button" aria-label="关闭详情">×</button></div><div id="detailKv" class="detail-kv"></div></section><section class="materials-detail"><h3>业务履历</h3><div id="timelineList" class="materials-timeline"></div></section><section class="materials-detail"><h3>处置与衔接</h3><div id="actionList" class="action-list"></div><div class="quick-links"><a href="./picking-requests.html">领料申请</a><a href="./shortage-alerts.html">缺料预警</a></div></section><section class="materials-detail"><h3>模拟记录</h3><div id="logList" class="action-list"></div></section></aside>
        </section>
      </main>
    </div>
    <script src="./materials.js"></script>
  </body>
</html>
