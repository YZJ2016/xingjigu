<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星技谷 MES | 工序完工</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./warehouse.css" />
  </head>
  <body>
    <script>window.WAREHOUSE_PAGE = { id: "operation", title: "工序完工", eyebrow: "完工与入库 / 工序完工" };</script>
    <div class="app-shell">
      <aside class="sidebar" aria-label="MES 业务导航菜单">
        <div class="brand"><div class="brand-mark">X</div><div><div class="brand-name">星技谷 MES</div><div class="brand-subtitle">生产运营中枢</div></div></div>
        <div class="menu-heading">业务导航</div>
        <nav id="warehouseModuleMenu" class="module-menu"></nav>
        <div class="sidebar-footer"><div class="factory-card"><div class="factory-card__label">当前工厂</div><div class="factory-card__name">华东一厂 · 电子装配车间</div><div class="factory-card__meta"><span>报工回执</span><span>WIP / 质量 / 下道工序</span></div></div></div>
      </aside>
      <main class="main warehouse-main">
        <header class="topbar">
          <div><div id="pageEyebrow" class="eyebrow"></div><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div>
          <div class="topbar-actions"><button id="primaryActionBtn" class="primary-action" type="button"></button><button id="resetWarehouseBtn" class="secondary-action" type="button">重置演示</button><a class="secondary-link" href="../station/operation-report.html">工序报工</a><a class="secondary-link" href="../dispatch/operation-tasks.html">工序任务</a><a class="secondary-link" href="../index.html">返回首页</a><div class="user-chip"><span class="avatar">入</span><span id="userRole"></span></div></div>
        </header>
        <section id="warehouseMetrics" class="warehouse-metrics"></section>
        <section class="warehouse-layout">
          <div class="warehouse-left">
            <section class="warehouse-panel">
              <div class="warehouse-toolbar"><label>搜索<input id="searchInput" type="search" placeholder="工单、派工单、批次、责任人" /></label><label>状态<select id="statusFilter"></select></label><label>产线<select id="lineFilter"></select></label></div>
            </section>
            <section class="warehouse-panel"><div class="warehouse-panel__head"><div><h3 id="tableTitle"></h3><p id="tableHint"></p></div><button id="openDetailBtn" type="button" hidden>打开详情</button></div><div class="warehouse-table-wrap"><table class="warehouse-table"><thead id="tableHead"></thead><tbody id="warehouseTableBody"></tbody></table></div></section>
            <section class="warehouse-panel"><div class="warehouse-panel__head"><div><h3 id="cardTitle"></h3><p>按完工、包装、入库、冻结和回传形成可追溯闭环</p></div></div><div id="warehouseCards" class="warehouse-card-grid"></div></section>
            <section class="simulation-box"><div class="simulation-box__head"><div><h3 id="simulationTitle"></h3><p id="simulationHint"></p></div></div><div class="simulation-form"><input id="simulationInput" type="text" /><div class="simulation-actions"><button id="simulateBtn" type="button">记录模拟回执</button><button id="secondaryActionBtn" type="button">登记异常处置</button></div></div></section>
          </div>
          <aside class="warehouse-side"><section id="warehouseDetail" class="warehouse-detail"><div class="warehouse-detail__head"><div><span id="detailStatus" class="pill"></span><h3 id="detailTitle"></h3><p id="detailSubtitle"></p></div><button id="closeDetailBtn" class="icon-button" type="button" aria-label="关闭详情">×</button></div><div id="detailKv" class="detail-kv"></div></section><section class="warehouse-detail"><h3>业务履历</h3><div id="timelineList" class="warehouse-timeline"></div></section><section class="warehouse-detail"><h3>处置与衔接</h3><div id="actionList" class="action-list"></div><div id="quickLinks" class="quick-links"></div></section><section class="warehouse-detail"><h3>模拟记录</h3><div id="logList" class="action-list"></div></section></aside>
        </section>
      </main>
    </div>
    <script src="../navigation.js"></script>
    <script src="../data/master-data.js"></script>
    <script src="../data/business-flow.js"></script>
    <script src="./warehouse.js"></script>
  </body>
</html>
