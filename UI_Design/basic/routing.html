<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星技谷 MES | 工艺路线</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./basic.css" />
  </head>
  <body>
    <script>window.BASIC_PAGE = { id: "routing", title: "工艺路线", eyebrow: "基础资料 / 工艺路线" };</script>
    <div class="app-shell">
      <aside class="sidebar" aria-label="MES 业务导航菜单">
        <div class="brand"><div class="brand-mark">X</div><div><div class="brand-name">星技谷 MES</div><div class="brand-subtitle">生产运营中枢</div></div></div>
        <div class="menu-heading">业务导航</div>
        <nav id="basicModuleMenu" class="module-menu"></nav>
        <div class="sidebar-footer">
          <div class="factory-card">
            <div class="factory-card__label">当前工厂</div>
            <div class="factory-card__name">华东一厂 · 电子装配车间</div>
            <div class="factory-card__meta"><span>工艺路线</span><span>PLM / 工位终端</span></div>
          </div>
        </div>
      </aside>
      <main class="main basic-main">
        <header class="topbar">
          <div><div id="pageEyebrow" class="eyebrow"></div><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div>
          <div class="topbar-actions">
            <button id="primaryActionBtn" class="primary-action" type="button">发布到执行</button>
            <button id="resetBasicBtn" class="secondary-action" type="button">重置演示</button>
            <a class="secondary-link" href="../dispatch/sop-view.html">工艺文件与作业指导</a>
            <a class="secondary-link" href="../station/work-instruction.html">工艺指导</a>
            <a class="secondary-link" href="../index.html">返回首页</a>
            <div class="user-chip"><span class="avatar">艺</span><span id="userRole"></span></div>
          </div>
        </header>
        <section id="basicMetrics" class="basic-metrics"></section>
        <section class="basic-layout">
          <div class="basic-left">
            <div class="basic-toolbar">
              <label>搜索<input id="searchInput" type="search" placeholder="路线、产品、工序、SOP、检验计划" /></label>
              <label>状态<select id="statusFilter"></select></label>
              <label>来源<select id="sourceFilter"></select></label>
            </div>
            <section class="basic-panel">
              <div class="basic-panel__head"><div><h3 id="tableTitle"></h3><p id="tableHint"></p></div><button id="openDetailBtn" type="button" hidden>打开详情</button></div>
              <div class="basic-table-wrap"><table class="basic-table"><thead id="tableHead"></thead><tbody id="basicTableBody"></tbody></table></div>
            </section>
            <section class="basic-panel routing-layer" aria-labelledby="routingOverviewTitle">
              <div class="basic-panel__head"><div><h3 id="routingOverviewTitle">路线总览</h3><p id="routingOverviewHint"></p></div></div>
              <div id="routingOverview" class="routing-overview"></div>
            </section>
            <section class="basic-panel routing-layer" aria-labelledby="routingStepsTitle">
              <div class="basic-panel__head"><div><h3 id="routingStepsTitle">工序路线明细</h3><p>按工序顺序展示工作中心、工位设备、准入校验、转序条件和责任记录</p></div></div>
              <div id="routingSteps" class="routing-steps"></div>
            </section>
            <section class="basic-panel routing-layer" aria-labelledby="routingStandardsTitle">
              <div class="basic-panel__head"><div><h3 id="routingStandardsTitle">执行标准与现场引用</h3><p>展示 SOP、检验规范、工艺参数和图纸版本的来源、下发、签收与追溯引用</p></div></div>
              <div id="routingStandards" class="routing-standards"></div>
            </section>
            <section class="basic-panel">
              <div class="basic-panel__head"><div><h3 id="cardTitle"></h3><p>路线决定派工顺序、开工准入、过程采集、质量触发和追溯节点</p></div></div>
              <div id="basicCards" class="basic-card-grid"></div>
            </section>
            <section class="simulation-box">
              <div class="simulation-box__head"><div><h3 id="simulationTitle"></h3><p id="simulationHint"></p></div></div>
              <div class="simulation-form"><input id="simulationInput" type="text" /><div class="simulation-actions"><button id="simulateBtn" type="button">记录模拟同步</button><button id="secondaryActionBtn" type="button">登记影响评估</button></div></div>
            </section>
          </div>
          <aside class="basic-side">
            <section id="basicDetail" class="basic-detail">
              <div class="basic-detail__head"><div><span id="detailStatus" class="pill"></span><h3 id="detailTitle"></h3><p id="detailSubtitle"></p></div><button id="closeDetailBtn" class="icon-button" type="button" aria-label="关闭详情">×</button></div>
              <div id="detailKv" class="detail-kv"></div>
            </section>
            <section class="basic-detail"><h3>版本与审批履历</h3><div id="timelineList" class="basic-timeline"></div></section>
            <section class="basic-detail"><h3>下游影响</h3><div id="actionList" class="action-list"></div><div class="quick-links"><a href="./operation-stations.html">工序工位</a><a href="../dispatch/operation-tasks.html">工序任务</a><a href="../quality/first-article.html">首件检验</a></div></section>
            <section class="basic-detail"><h3>模拟记录</h3><div id="logList" class="action-list"></div></section>
          </aside>
        </section>
      </main>
    </div>
    <script src="../navigation.js"></script>
    <script src="../data/master-data.js"></script>
    <script src="../data/business-flow.js"></script>
    <script src="./basic.js"></script>
  </body>
</html>
