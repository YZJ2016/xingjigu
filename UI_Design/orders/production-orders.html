<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星技谷 MES | 生产订单</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./production-orders.css" />
    <link rel="stylesheet" href="./order-maintenance.css" />
  </head>
  <body data-order-maintenance="orders">
    <div class="app-shell">
      <aside class="sidebar" aria-label="MES 业务导航菜单">
        <div class="brand">
          <div class="brand-mark">X</div>
          <div>
            <div class="brand-name">星技谷 MES</div>
            <div class="brand-subtitle">生产运营中枢</div>
          </div>
        </div>

        <div class="menu-heading">业务导航</div>
        <nav id="orderModuleMenu" class="module-menu"></nav>

        <div class="sidebar-footer">
          <div class="factory-card">
            <div class="factory-card__label">当前工厂</div>
            <div class="factory-card__name">华东一厂 · 电子装配车间</div>
            <div class="factory-card__meta">
              <span>Line-A</span>
              <span>白班 08:00-20:00</span>
            </div>
          </div>
        </div>
      </aside>

      <main class="main order-main">
        <header class="topbar">
          <div>
            <div class="eyebrow">订单与计划 / 生产订单</div>
            <h1>生产订单管理</h1>
          </div>
          <div class="topbar-actions">
            <button id="createOrderBtn" class="primary-action" type="button">新建 MES 手工工单</button>
            <button id="syncErpBtn" class="primary-action" type="button">导入/同步工单</button>
            <button id="resetOrderPageBtn" class="secondary-action" type="button">重置订单原型数据</button>
            <a class="secondary-link" href="../index.html">返回首页</a>
            <div class="user-chip">
              <span class="avatar">陈</span>
              <span>生产经理</span>
            </div>
          </div>
        </header>

        <section class="order-metrics" aria-label="生产订单统计">
          <article>
            <span>订单总数</span>
            <strong id="metricTotal">0</strong>
            <em>当前筛选范围</em>
          </article>
          <article>
            <span>待评审</span>
            <strong id="metricReview">0</strong>
            <em>资料校验未完成</em>
          </article>
          <article>
            <span>待排程</span>
            <strong id="metricSchedule">0</strong>
            <em>需要 APS 计划</em>
          </article>
          <article>
            <span>交期/缺料风险</span>
            <strong id="metricRisk">0</strong>
            <em>需计划跟进</em>
          </article>
        </section>

        <section class="order-workspace">
          <div class="order-list-panel">
            <div class="toolbar">
              <div class="search-box">
                <label for="orderSearch">搜索</label>
                <input id="orderSearch" type="search" placeholder="工单号、产品、客户、产线" />
              </div>
              <label>
                状态
                <select id="statusFilter">
                  <option value="all">全部状态</option>
                  <option value="待评审">待评审</option>
                  <option value="待排程">待排程</option>
                  <option value="已排程">已排程</option>
                  <option value="已下达">已下达</option>
                  <option value="生产中">生产中</option>
                  <option value="待备料">待备料</option>
                  <option value="待首检">待首检</option>
                  <option value="包装中">包装中</option>
                  <option value="已暂停">已暂停</option>
                  <option value="已作废">已作废</option>
                </select>
              </label>
              <label>
                产线
                <select id="lineFilter">
                  <option value="all">全部产线</option>
                  <option value="Line-A">Line-A</option>
                  <option value="Line-B">Line-B</option>
                  <option value="Line-C">Line-C</option>
                </select>
              </label>
              <label>
                风险
                <select id="riskFilter">
                  <option value="all">全部风险</option>
                  <option value="正常">正常</option>
                  <option value="缺料">缺料</option>
                  <option value="交期">交期</option>
                  <option value="设备">设备</option>
                  <option value="质量">质量</option>
                  <option value="资料">资料</option>
                </select>
              </label>
            </div>

            <div class="table-wrap">
              <table class="order-table">
                <colgroup>
                  <col class="col-order" />
                  <col class="col-product" />
                  <col class="col-customer" />
                  <col class="col-qty" />
                  <col class="col-status" />
                  <col class="col-date" />
                  <col class="col-line" />
                  <col class="col-risk" />
                  <col class="col-progress" />
                  <col class="col-actions" />
                </colgroup>
                <thead>
                  <tr>
                    <th>工单号</th>
                    <th>产品</th>
                    <th>客户</th>
                    <th>数量</th>
                    <th>状态</th>
                    <th>交期</th>
                    <th>产线</th>
                    <th>风险</th>
                    <th>进度</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="orderTableBody"></tbody>
              </table>
            </div>
            <div class="pagination-bar" aria-label="生产订单分页">
              <div id="paginationInfo" class="pagination-info">共 0 条</div>
              <div class="pagination-controls">
                <label>
                  每页
                  <select id="pageSizeSelect">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="20">20</option>
                  </select>
                </label>
                <button id="prevPageBtn" type="button">上一页</button>
                <div id="pageButtons" class="page-buttons"></div>
                <button id="nextPageBtn" type="button">下一页</button>
              </div>
            </div>
          </div>

          <aside class="order-detail-panel">
            <div class="detail-head">
              <span id="detailStatus">已下达</span>
              <h2 id="detailOrderId">MO-202606-0001</h2>
              <p id="detailProduct">智能温控控制器 TCU-100</p>
            </div>

            <div class="detail-grid" id="detailGrid"></div>

            <section class="detail-section">
              <div class="section-title">
                <h3>订单准入校验</h3>
                <button id="reviewPassBtn" type="button">评审通过</button>
              </div>
              <div id="reviewChecklist" class="check-list"></div>
            </section>

            <section class="detail-section">
              <div class="section-title">
                <h3>排程与齐套</h3>
                <button id="scheduleConfirmBtn" type="button">生成排程版本</button>
              </div>
              <div id="schedulePlan" class="schedule-list"></div>
            </section>

            <section class="detail-section">
              <div class="section-title">
                <h3>联动影响</h3>
              </div>
              <div id="integrationList" class="integration-list"></div>
            </section>

            <section class="detail-section">
              <div class="section-title">
                <h3>业务动作</h3>
              </div>
              <div class="action-grid">
                <button id="editActiveOrderBtn" type="button">编辑订单</button>
                <button id="kitReadyBtn" type="button">标记齐套</button>
                <button id="priorityBtn" type="button">提交加急会签</button>
                <button id="createRiskBtn" type="button">登记计划风险</button>
                <button id="deleteActiveOrderBtn" class="danger-action" type="button">删除草稿/作废申请</button>
              </div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <div id="orderFormBackdrop" class="modal-backdrop" hidden>
      <section class="modal order-form-modal" role="dialog" aria-modal="true" aria-labelledby="orderFormTitle">
        <div class="modal__header">
          <div>
            <div class="drawer__label">生产订单</div>
            <h3 id="orderFormTitle">新建 MES 手工工单</h3>
          </div>
          <button id="orderFormClose" class="icon-button" type="button" aria-label="关闭订单表单">×</button>
        </div>

        <form id="orderForm" class="order-form">
          <label>
            工单号
            <input id="formOrderId" name="id" type="text" required />
          </label>
          <label>
            来源类型
            <select id="formSourceType" name="sourceType" required>
              <option value="MES 手工工单">MES 手工工单</option>
              <option value="外部系统同步">外部系统同步</option>
              <option value="Excel 导入">Excel 导入</option>
            </select>
          </label>
          <label>
            产品
            <select id="formProduct" name="product" required></select>
            <small id="formProductHint" class="field-hint">产品来源于基础资料 / 产品资料，支持外部同步或 MES 手工维护</small>
          </label>
          <label>
            客户
            <select id="formCustomer" name="customer" required></select>
            <small id="formCustomerHint" class="field-hint">客户来源于基础资料 / 客户供应商，支持外部同步或 MES 手工维护</small>
          </label>
          <label>
            计划数量
            <input id="formQty" name="qty" type="number" min="1" required />
          </label>
          <label>
            完成数量
            <input id="formDone" name="done" type="number" min="0" required />
          </label>
          <label>
            承诺交期
            <input id="formDue" name="due" type="date" required />
          </label>
          <label>
            产线
            <select id="formLine" name="line">
              <option value="Line-A">Line-A</option>
              <option value="Line-B">Line-B</option>
              <option value="Line-C">Line-C</option>
            </select>
          </label>
          <label>
            状态
            <select id="formStatus" name="status">
              <option value="待评审">待评审</option>
              <option value="待排程">待排程</option>
              <option value="已排程">已排程</option>
              <option value="已下达">已下达</option>
              <option value="生产中">生产中</option>
              <option value="待备料">待备料</option>
              <option value="待首检">待首检</option>
              <option value="待检">待检</option>
              <option value="包装中">包装中</option>
              <option value="已暂停">已暂停</option>
              <option value="已作废">已作废</option>
            </select>
          </label>
          <label>
            优先级
            <select id="formPriority" name="priority">
              <option value="低">低</option>
              <option value="中">中</option>
              <option value="高">高</option>
              <option value="紧急">紧急</option>
            </select>
          </label>
          <label>
            风险
            <select id="formRisk" name="risk">
              <option value="正常">正常</option>
              <option value="缺料">缺料</option>
              <option value="交期">交期</option>
              <option value="设备">设备</option>
              <option value="质量">质量</option>
              <option value="资料">资料</option>
            </select>
          </label>
          <label>
            计划员
            <input id="formPlanner" name="planner" type="text" required />
          </label>
          <label>
            订单批次
            <input id="formBatchPlan" name="batchPlan" type="text" required />
          </label>
          <label>
            齐套状态
            <input id="formKit" name="kit" type="text" required />
          </label>
          <label>
            物料说明
            <input id="formMaterialGap" name="materialGap" type="text" required />
          </label>
          <div class="modal__actions">
            <button id="orderFormCancel" class="secondary-action" type="button">取消</button>
            <button class="primary-action" type="submit">保存订单</button>
          </div>
        </form>
      </section>
    </div>

    <div id="confirmBackdrop" class="modal-backdrop confirm-backdrop" hidden>
      <section class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="confirm-modal__head">
          <span id="confirmTone" class="confirm-badge">高风险操作</span>
          <button id="confirmCloseBtn" class="icon-button" type="button" aria-label="关闭确认弹窗">×</button>
        </div>
        <h3 id="confirmTitle">确认操作</h3>
        <p id="confirmMessage"></p>
        <div id="confirmMeta" class="confirm-meta"></div>
        <div class="modal__actions confirm-actions">
          <button id="confirmCancelBtn" class="secondary-action" type="button">取消</button>
          <button id="confirmOkBtn" class="primary-action" type="button">确认</button>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="../navigation.js"></script>
    <script src="../data/master-data.js"></script>
    <script src="../data/business-flow.js"></script>
    <script src="./production-orders.js"></script>
    <script src="./order-maintenance.js"></script>
  </body>
</html>
