<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星技谷 MES | 工装夹具</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./equipment.css" />
  </head>
  <body>
    <script>
      window.EQUIPMENT_PAGE = { id: "tooling", title: "工装夹具", eyebrow: "设备与保养 / 工装夹具" };
    </script>
    <div class="app-shell">
      <aside class="sidebar" aria-label="MES 业务导航菜单">
        <div class="brand"><div class="brand-mark">X</div><div><div class="brand-name">星技谷 MES</div><div class="brand-subtitle">生产运营中枢</div></div></div>
        <div class="menu-heading">业务导航</div>
        <nav id="equipmentModuleMenu" class="module-menu"></nav>
        <div class="sidebar-footer"><div class="factory-card"><div class="factory-card__label">当前工厂</div><div class="factory-card__name">华东一厂 · 电子装配车间</div><div class="factory-card__meta"><span>工装夹具</span><span>寿命 / 准入 / 追溯</span></div></div></div>
      </aside>
      <main class="main equipment-main">
        <header class="topbar">
          <div><div id="pageEyebrow" class="eyebrow"></div><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div>
          <div class="topbar-actions"><button id="primaryActionBtn" class="primary-action" type="button">登记模拟准入回执</button><button id="resetEquipmentBtn" class="secondary-action" type="button">重置演示</button><a class="secondary-link" href="./calibration.html">量检具校准</a><a class="secondary-link" href="../dispatch/start-check.html">开工检查</a><a class="secondary-link" href="../index.html">返回首页</a><div class="user-chip"><span class="avatar">装</span><span id="userRole"></span></div></div>
        </header>
        <section id="equipmentMetrics" class="equipment-metrics"></section>
        <section class="equipment-layout">
          <div class="equipment-left">
            <div class="equipment-toolbar"><label>搜索<input id="searchInput" type="search" placeholder="工装、夹具、治具、工序、工位、责任人" /></label><label>状态<select id="statusFilter"></select></label><label>产线<select id="lineFilter"></select></label></div>
            <section class="equipment-panel"><div class="equipment-panel__head"><div><h3 id="tableTitle"></h3><p id="tableHint"></p></div><button id="openDetailBtn" type="button" hidden>打开详情</button></div><div class="equipment-table-wrap"><table class="equipment-table"><thead id="tableHead"></thead><tbody id="equipmentTableBody"></tbody></table></div></section>
            <section class="equipment-panel"><div class="equipment-panel__head"><div><h3 id="cardTitle"></h3><p>保留工装版本、寿命计数、绑定工序、准入结果和追溯引用</p></div></div><div id="equipmentCards" class="equipment-card-grid"></div></section>
            <section class="simulation-box"><div class="simulation-box__head"><div><h3 id="simulationTitle"></h3><p id="simulationHint"></p></div></div><div class="simulation-form"><input id="simulationInput" type="text" /><div class="simulation-actions"><button id="simulateBtn" type="button">记录模拟回执</button><button id="secondaryActionBtn" type="button">登记异常处置</button></div></div></section>
          </div>
          <aside class="equipment-side"><section id="equipmentDetail" class="equipment-detail"><div class="equipment-detail__head"><div><span id="detailStatus" class="pill"></span><h3 id="detailTitle"></h3><p id="detailSubtitle"></p></div><button id="closeDetailBtn" class="icon-button" type="button" aria-label="关闭详情">×</button></div><div id="detailKv" class="detail-kv"></div></section><section class="equipment-detail"><h3>业务履历</h3><div id="timelineList" class="equipment-timeline"></div></section><section class="equipment-detail"><h3>处置与衔接</h3><div id="actionList" class="action-list"></div><div class="quick-links"><a href="../dispatch/start-check.html">开工检查</a><a href="../quality/process-inspection.html">过程检验</a><a href="../traceability/equipment-history.html">设备履历</a></div></section><section class="equipment-detail"><h3>模拟记录</h3><div id="logList" class="action-list"></div></section></aside>
        </section>
      </main>
    </div>
    <script src="../navigation.js"></script>
    <script src="../data/master-data.js"></script>
    <script src="../data/business-flow.js"></script>
    <script src="./equipment.js"></script>
  </body>
</html>
